<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lanterne</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/clock.css">
  <link rel="stylesheet" href="css/rituals.css">
  <link rel="stylesheet" href="css/scrapbook.css">
  <link rel="stylesheet" href="css/settings.css">
  <link rel="stylesheet" href="css/search.css">
</head>
<body>
  <div class="background-layer" id="bg-layer"></div>
  <div class="background-overlay" id="bg-overlay"></div>
  <canvas class="ambience-canvas" id="ambience-canvas"></canvas>

  <main class="content">
    <!-- Clock & Greeting -->
    <section class="clock-section fade-in fade-in-1" id="clock-section">
      <div class="greeting" id="greeting"></div>
      <div class="clock" id="clock"></div>
      <div class="date-display" id="date-display"></div>
      <div class="weather" id="weather"></div>
    </section>

    <!-- Search -->
    <section class="search-section fade-in fade-in-2" id="search-section">
    </section>

    <!-- Quick Links -->
    <section class="quicklinks-section fade-in fade-in-3" id="quicklinks-section">
    </section>

    <!-- Rituals -->
    <section class="rituals-section fade-in fade-in-4" id="rituals-section">
    </section>
  </main>

  <!-- Scrapbook (floating button + sidebar) -->
  <div class="scrapbook-trigger fade-in fade-in-5" id="scrapbook-trigger">
    <button class="scrapbook-btn" id="scrapbook-btn" title="Gem denne side">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
      </svg>
    </button>
  </div>
  <aside class="scrapbook-panel" id="scrapbook-panel"></aside>

  <!-- Settings (gear icon top-right) -->
  <button class="settings-trigger fade-in fade-in-6" id="settings-trigger" title="Indstillinger">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </button>
  <div class="settings-panel" id="settings-panel"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
