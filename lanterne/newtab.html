<!DOCTYPE html>
<html lang="da">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ny fane</title>
  <link rel="icon" type="image/png" sizes="16x16" href="icons/fane-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/fane-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="icons/fane-48.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/clock.css">
  <link rel="stylesheet" href="css/checklist.css">
  <link rel="stylesheet" href="css/scrapbook.css">
  <link rel="stylesheet" href="css/settings.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/widgets.css">
  <link rel="stylesheet" href="css/sounds.css">
</head>

<body>
  <div class="background-layer" id="bg-layer"></div>
  <div class="background-overlay" id="bg-overlay"></div>
  <canvas class="daynight-canvas" id="daynight-canvas"></canvas>
  <canvas class="ambience-canvas" id="ambience-canvas"></canvas>

  <main class="content">
    <!-- Clock & Greeting -->
    <section class="clock-section fade-in fade-in-1" id="clock-section">
      <div class="greeting" id="greeting"></div>
      <div class="clock" id="clock"></div>
      <div class="date-display" id="date-display"></div>
      <div class="weather" id="weather"></div>
    </section>

    <!-- Stats -->
    <section class="stats-section fade-in fade-in-2 focusable-hide" id="stats-section">
    </section>

    <!-- Search -->
    <section class="search-section fade-in fade-in-2 focusable-hide" id="search-section">
    </section>

    <!-- Quick Links -->
    <section class="quicklinks-section fade-in fade-in-3 focusable-hide" id="quicklinks-section">
    </section>

    <!-- Checklist -->
    <section class="checklist-section fade-in fade-in-4 focusable-hide" id="checklist-section">
    </section>

    <!-- Widgets -->
    <section class="widgets-section fade-in fade-in-5 focusable-hide" id="widgets-section">
    </section>
  </main>

  <!-- Top bar with action buttons -->
  <div class="top-bar fade-in fade-in-6">
    <div class="top-bar-left">
      <button class="top-bar-btn" id="focus-toggle" title="Fokus tilstand">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <circle cx="12" cy="12" r="4" />
        </svg>
      </button>
      <button class="top-bar-btn" id="widget-add-trigger" title="Tilføj widget">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      </button>
      <button class="top-bar-btn" id="widget-reset-trigger" title="Nulstil widget-layout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      </button>
    </div>
    <div class="top-bar-right">
      <button class="top-bar-btn" id="sound-trigger" title="Ambient lyde">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13" />
          <circle cx="6" cy="18" r="3" />
          <circle cx="18" cy="16" r="3" />
        </svg>
      </button>
      <button class="top-bar-btn" id="scrapbook-btn" title="Scrapbook">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z" />
        </svg>
      </button>
      <button class="top-bar-btn" id="settings-trigger" title="Indstillinger">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </button>
    </div>
  </div>
  <aside class="scrapbook-panel" id="scrapbook-panel"></aside>
  <div class="settings-panel" id="settings-panel"></div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
